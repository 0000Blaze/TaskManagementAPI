services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medivue
      POSTGRES_PASSWORD: medivue
      POSTGRES_DB: medivue
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medivue -d medivue"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://medivue:medivue@db:5432/medivue
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
